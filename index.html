<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Class AI</title>
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0d0d0d; color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (Tetap kayak foto kamu) */
        .sidebar {
            width: 260px;
            background-color: #121212;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        .brand { color: #00ffa3; font-weight: bold; margin-bottom: 20px; }
        .btn-new-chat {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
        }

        /* AREA CHAT UTAMA (Dibuat Lebih Luas) */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, #1a1a2e, #0d0d0d);
        }

        #chat-box {
            flex: 1;
            padding: 40px 10% 120px 10%; /* Area chat luas ke tengah */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* BUBBLE CHAT DIPERLUAS */
        .message {
            max-width: 85%; /* Lebih lebar dari sebelumnya */
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.6;
        }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid #333; }
        .user { align-self: flex-end; background: #00ffa3; color: black; font-weight: 500; }

        /* INPUT AREA (Persis kayak foto kamu) */
        .input-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%; /* Luas input di bawah */
            max-width: 1000px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #8a2be2; /* Border ungu neon kamu */
            border-radius: 30px;
            padding: 10px 25px;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .btn-kirim {
            background: transparent;
            border: none;
            color: #00ffa3;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        /* Scrollbar biar rapi */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">DIGITAL CLASS 7.1</div>
        <button class="btn-new-chat">+ CHAT BARU</button>
        <div style="color: #666; font-size: 12px; margin-top: auto;">Powered by Beni Jaya<br>Creator: Chyko</div>
    </div>

    <div class="main-chat">
        <div id="chat-box">
            <div class="message ai">Halo! Saya siap membantu Anda dengan pertanyaan atau masalah yang Anda hadapi. Apa yang ingin Anda tanyakan?</div>
            <div class="message user">halo</div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanyakan apa saja...">
                <button class="btn-kirim" onclick="sendMessage()">KIRIM</button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            if (!input.value) return;

            box.innerHTML += `<div class="message user">${input.value}</div>`;
            const text = input.value;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://bloodier-rey-riotingly.ngrok-free.dev/api/ai', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                box.innerHTML += `<div class="message ai">${data.reply}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (err) {
                box.innerHTML += `<div class="message ai" style="color: #ff4d4d;">Server Error. Cek CMD Laptop!</div>`;
            }
        }
    </script>
</body>
</html>
