<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chyko AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Container dibuat luas */
        .chat-container {
            width: 95%;
            max-width: 700px;
            height: 90vh;
            background: #2d2d2d;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Area chat yang lega */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; }
        .ai { align-self: flex-start; background: #444; }

        /* Area input di bawah */
        .input-area {
            padding: 15px;
            background: #222;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 0 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Tanya sesuatu...">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const text = input.value;
        if (!text) return;

        // Tampilkan pesan user
        box.innerHTML += `<div class="message user">${text}</div>`;
        input.value = '';

        try {
            // LINK NGROK KAMU YANG SUDAH BENER (HTTPS)
            const response = await fetch('https://bloodier-rey-riotingly.ngrok-free.dev/api/ai', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // Biar gak muncul halaman biru
                },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            box.innerHTML += `<div class="message ai">${data.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (err) {
            box.innerHTML += `<div class="message ai" style="color: red;">Server Error: Pastikan Server & Ngrok di Laptop Nyala!</div>`;
        }
    }
</script>

</body>
</html>
