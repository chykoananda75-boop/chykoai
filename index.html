<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI</title>
    <style>
        /* Pakai gaya yang lama tapi dibuat luas */
        body { 
            background-color: #0d0d0d; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        #chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            /* Lebar chat diatur di sini biar luas */
            max-width: 1000px; 
            margin: 0 auto;
            width: 95%;
        }

        .message { 
            padding: 12px 18px; 
            border-radius: 10px; 
            max-width: 85%; 
            line-height: 1.5;
        }

        .ai { background: #222; align-self: flex-start; border: 1px solid #333; }
        .user { background: #00ffa3; color: black; align-self: flex-end; font-weight: bold; }

        .input-area { 
            padding: 20px; 
            background: #111; 
            display: flex; 
            justify-content: center;
        }

        .wrapper {
            display: flex;
            width: 100%;
            max-width: 1000px;
            gap: 10px;
        }

        input { 
            flex: 1; 
            padding: 15px; 
            border-radius: 5px; 
            border: 1px solid #8a2be2; 
            background: #000; 
            color: white; 
        }

        button { 
            padding: 15px 25px; 
            background: #8a2be2; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="message ai">Halo! Ada yang bisa dibantu?</div>
    </div>

    <div class="input-area">
        <div class="wrapper">
            <input type="text" id="user-input" placeholder="Ketik di sini...">
            <button onclick="sendMessage()">KIRIM</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const msg = input.value;
            if (!msg) return;

            // Tampilkan pesan user
            box.innerHTML += `<div class="message user">${msg}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://bloodier-rey-riotingly.ngrok-free.dev/api/ai', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ message: msg })
                });

                const data = await response.json();
                
                // INI KUNCINYA BIAR GAK UNDEFINED:
                // Dia bakal coba baca 'reply', kalau gak ada baca 'response', kalau gak ada baca 'text'
                const hasil = data.reply || data.response || data.text || "Gagal baca respon server";

                box.innerHTML += `<div class="message ai">${hasil}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += `<div class="message ai" style="color: red;">SERVER ERROR!</div>`;
            }
        }
    </script>
</body>
</html>
